<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU Tree Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .ncsu-red { background-color: #CC0000; }
        #chart-container { position: relative; height: 280px; width: 100%; background: #fff; border-radius: 12px; }
        .helper-box { display: none; background: #fef2f2; border: 2px solid #fee2e2; border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 12px; color: #991b1b; }
    </style>
</head>
<body class="p-2 md:p-6 pb-20">
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-red-600">
        <div class="bg-zinc-900 p-6 text-white">
            <h1 class="text-xl font-black italic uppercase">NC STATE UNIVERSITY</h1>
            <p class="text-red-500 text-[10px] font-bold uppercase mt-1">Campus Planning & Strategic Investment</p>
        </div>

        <div class="p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-10">
            <form id="treeForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase">Unity ID</label>
                    <input type="text" name="A:Surveyor" id="unity_id" class="w-full border-2 p-3 rounded-lg font-bold" required>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase">Circumference (In)</label>
                        <input type="number" id="circ_input" step="0.1" class="w-full border-2 p-3 rounded-lg font-bold" placeholder="37.7">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase">DBH (Inches)</label>
                        <input type="number" name="B:DBH" id="dbh_input" step="0.1" class="w-full border-2 p-3 rounded-lg font-bold" placeholder="12.0">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase">Species Group</label>
                    <select name="C:Species" id="species_group" class="w-full border-2 p-3 rounded-lg font-bold" required>
                        <option value="" disabled selected>Select Group...</option>
                        <option value="hardwood">Broadleaf: Sturdy (Oak, Hickory)</option>
                        <option value="soft_hardwood">Broadleaf: Fast (Maple, Poplar)</option>
                        <option value="evergreen">Evergreen: Needles (Pine, Cedar)</option>
                        <option value="small_ornate">Small/Flowering (Dogwood, Holly)</option>
                    </select>
                    <div id="species-helper" class="helper-box"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase">Tree Condition</label>
                    <select name="D:Condition" id="tree_condition" class="w-full border-2 p-3 rounded-lg font-bold">
                        <option value="1.0">Excellent (100%)</option>
                        <option value="0.8" selected>Good (80%)</option>
                        <option value="0.6">Fair (60%)</option>
                        <option value="0.4">Poor (40%)</option>
                    </select>
                </div>

                <button type="button" onclick="handleGPS()" class="w-full bg-zinc-800 text-white p-3 rounded-lg font-black text-[10px] uppercase">🛰️ Capture GPS</button>
                <input type="text" name="E:GPS" id="coords" readonly class="w-full mt-2 bg-zinc-100 border p-3 rounded text-[11px] font-mono text-center" placeholder="GPS Required" required>
                
                <input type="hidden" name="F:Calculated_DBH" id="hidden_dbh">
                <input type="hidden" name="G:CO2_Lbs" id="hidden_co2">
                <input type="hidden" name="H:Asset_Value" id="hidden_value">
                <input type="hidden" name="I:Timestamp" id="timestamp">

                <button type="submit" id="submit_btn" class="w-full ncsu-red text-white p-5 rounded-xl font-black uppercase tracking-widest shadow-xl">Log Asset</button>
            </form>

            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-zinc-900 text-white p-6 rounded-2xl border-b-4 border-red-600 shadow-lg">
                        <p class="text-red-500 font-black text-[10px] uppercase">CO2 Storage (Lbs)</p>
                        <p class="text-4xl font-black italic mt-1"><span id="display-co2">0</span></p>
                    </div>
                    <div class="bg-zinc-900 text-white p-6 rounded-2xl border-b-4 border-green-500 shadow-lg">
                        <p class="text-green-500 font-black text-[10px] uppercase">Asset Value</p>
                        <p class="text-4xl font-black italic mt-1">$<span id="display-value">0.00</span></p>
                    </div>
                </div>
                <div class="bg-zinc-50 border-2 rounded-2xl p-4">
                    <div id="chart-container"><canvas id="growthChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="bg-zinc-100 p-8 text-zinc-600 border-t-2 border-zinc-200 text-[11px]">
            <h2 class="text-zinc-900 font-black uppercase mb-2">Methodology & Citations</h2>
            <p><strong>I. Biomass:</strong> Jenkins et al. (2003) regression. BM = Exp(b0 + b1 * ln(DBH_cm)).</p>
            <p><strong>II. Valuation:</strong> U.S. EPA (2023) Social Cost of Carbon (~$0.09/lb CO2e).</p>
        </div>
    </div>

    <script>
        const jenkins = { 
            "hardwood": [-2.0127, 2.4342, "Oaks, Hickory, Beech"], 
            "soft_hardwood": [-2.48, 2.4835, "Maples, Poplars, Elms"], 
            "evergreen": [-2.5356, 2.4349, "Pines, Cedars, Spruce"], 
            "small_ornate": [-0.7152, 1.7029, "Dogwoods, Hollies, Redbuds"] 
        };
        let myChart = null;

        window.onload = () => {
            const ctx = document.getElementById('growthChart').getContext('2d');
            myChart = new Chart(ctx, { type: 'line', data: { labels: ['Today', '+5y', '+10y', '+15y', '+20y'], datasets: [{ label: 'Lbs CO2', data: [0,0,0,0,0], borderColor: '#CC0000', backgroundColor: 'rgba(204,0,0,0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false } });
            const saved = localStorage.getItem('ncsu_unity_id');
            if (saved) document.getElementById('unity_id').value = saved;
        };

        // Sync inputs
        document.getElementById('circ_input').oninput = function() {
            document.getElementById('dbh_input').value = (this.value / Math.PI).toFixed(1);
            updateMath();
        };
        document.getElementById('dbh_input').oninput = function() {
            document.getElementById('circ_input').value = (this.value * Math.PI).toFixed(1);
            updateMath();
        };

        function handleGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('coords').value = pos.coords.latitude.toFixed(6) + ", " + pos.coords.longitude.toFixed(6);
                document.getElementById('coords').style.background = "#dcfce7";
            }, err => alert("GPS Error"), {enableHighAccuracy: true});
        }

        function updateMath() {
            const dbh = parseFloat(document.getElementById('dbh_input').value) || 0;
            const group = document.getElementById('species_group').value;
            const mult = parseFloat(document.getElementById('tree_condition').value);
            
            if (group) {
                const helper = document.getElementById('species-helper');
                helper.style.display = 'block';
                helper.innerHTML = "<strong>ID Guide:</strong> " + jenkins[group][2];
            }

            if (dbh > 0 && group) {
                const [b0, b1] = jenkins[group];
                const co2 = Math.round(Math.exp(b0 + b1 * Math.log(dbh * 2.54)) * 0.5 * 3.6663 * 2.2046 * mult);
                document.getElementById('display-co2').innerText = co2.toLocaleString();
                document.getElementById('display-value').innerText = (co2 * 0.09).toFixed(2);
                document.getElementById('hidden_dbh').value = dbh;
                document.getElementById('hidden_co2').value = co2;
                document.getElementById('hidden_value').value = (co2 * 0.09).toFixed(2);
                
                const newData = [0, 5, 10, 15, 20].map(y => Math.round(Math.exp(b0 + b1 * Math.log((dbh + (y*0.2)) * 2.54)) * 0.5 * 3.6663 * 2.2046 * mult));
                myChart.data.datasets[0].data = newData;
                myChart.update();
            }
        }

        document.getElementById('species_group').onchange = updateMath;
        document.getElementById('tree_condition').onchange = updateMath;

        document.getElementById('treeForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit_btn');
            document.getElementById('timestamp').value = new Date().toLocaleString();
            localStorage.setItem('ncsu_unity_id', document.getElementById('unity_id').value);
            
            btn.disabled = true; btn.innerText = "UPLOADING...";
            
            await fetch("https://api.sheetmonkey.io/form/336EJZmaN8Aa7rG5DSNAJG", { 
                method: 'POST', 
                body: new FormData(e.target), 
                mode: 'no-cors' 
            });
            
            alert("ASSET LOGGED SUCCESSFULLY!");
            location.reload(); 
        };
    </script>
</body>
</html>
