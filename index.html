<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU | Strategic Investment Tree Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f1f1; }
        .ncsu-red { background-color: #CC0000; }
        .ncsu-dark { background-color: #222222; }
    </style>
</head>
<body class="min-h-screen p-4">

    <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-2xl overflow-hidden border-t-8 border-red-600">
        <div class="ncsu-dark p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold tracking-widest uppercase">Campus Planning & Strategic Investment</p>
            </div>
            <div class="text-[10px] font-bold text-red-700 bg-white px-3 py-1.5 rounded uppercase flex items-center gap-2">
                <div class="w-2.5 h-2.5 ncsu-red rounded-full animate-pulse"></div>
                SYNC ACTIVE
            </div>
        </div>

        <div class="p-8 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Tree ID #</label>
                        <input type="text" id="tree_id" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold" placeholder="Ex: OAK-01">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">DBH (Whole Inches)</label>
                            <input type="number" id="dbh" step="1" pattern="\d*" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Species Group</label>
                            <select id="species_group" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold">
                                <option value="hard_maple">Hardwood (Oak/Hickory)</option>
                                <option value="pine">Softwood (Pine/Loblolly)</option>
                                <option value="mixed_hardwood">Mixed Hardwood</option>
                                <option value="soft_maple">Soft Hardwood (Maple)</option>
                                <option value="cedar">Cedar/Cypress</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Condition</label>
                        <select id="condition" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold">
                            <option value="1.0">Excellent (100%)</option>
                            <option value="0.8">Good (80%)</option>
                            <option value="0.6">Fair (60%)</option>
                            <option value="0.4">Poor (40%)</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="coords" readonly class="flex-1 bg-stone-100 border border-stone-300 rounded-lg px-4 py-2 text-[10px] font-mono" placeholder="GPS Lat, Lon">
                        <button onclick="getLocation()" class="ncsu-dark text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">GPS</button>
                    </div>
                    <button onclick="logData()" id="submitBtn" class="w-full ncsu-red text-white font-black py-4 rounded-xl shadow-xl uppercase tracking-widest mt-4">Submit Log Entry</button>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-inner">
                    <h3 class="text-[10px] font-black text-red-600 uppercase mb-4 text-center">Jenkins 20-Year Growth Projection</h3>
                    <canvas id="growthChart" height="150"></canvas>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-stone-900 text-white p-6 rounded-2xl">
                        <p class="text-red-500 font-bold text-[10px] uppercase">CO2 Storage</p>
                        <p class="text-4xl font-black italic mt-1"><span id="current-co2">0</span> <span class="text-xs uppercase text-stone-500">lbs</span></p>
                    </div>
                    <div class="bg-white border-2 border-stone-900 p-6 rounded-2xl">
                        <p class="text-stone-400 font-bold text-[10px] uppercase">Session Qty</p>
                        <p class="text-4xl font-black italic mt-1 text-stone-900"><span id="entry-count">0</span></p>
                    </div>
                </div>
                <div class="bg-red-50 p-4 rounded-xl">
                    <p id="sync-status" class="text-xs text-red-700 font-medium italic text-center">Ready for input.</p>
                </div>
            </div>
        </div>

        <footer class="bg-stone-50 p-6 border-t border-stone-200 text-center">
            <p class="text-[10px] text-stone-500 italic">Methodology: Jenkins, J.C., et al. (2003). Whole number biomass estimators.</p>
            <p class="text-[10px] font-black text-red-700 uppercase mt-2">Go Pack! 🐺</p>
        </footer>
    </div>

    <script>
        const jenkinsData = {
            "hard_maple": { b0: -2.0127, b1: 2.4342 },
            "pine": { b0: -2.5356, b1: 2.4349 },
            "mixed_hardwood": { b0: -2.4800, b1: 2.4835 },
            "soft_maple": { b0: -1.9123, b1: 2.3651 },
            "cedar": { b0: -2.0336, b1: 2.2592 }
        };

        const SHEET_URL = "https://api.sheetmonkey.io/form/38UXSMPRKwdshUDaCwDnHk";
        let surveyCount = 0;
        let myChart;

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('coords').value = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                }, () => { alert("Check GPS permissions."); });
            }
        }

        function calcCO2(dbhIn, b0, b1, health = 1.0) {
            if (!dbhIn || dbhIn <= 0) return 0;
            const dbhCm = dbhIn * 2.54;
            const biomassKg = Math.exp(b0 + b1 * Math.log(dbhCm));
            // Rounding to nearest whole number
            return Math.round((biomassKg * 0.5) * 3.6663 * 2.20462 * health);
        }

        function runLiveCalc() {
            const dbh = Math.round(parseFloat(document.getElementById('dbh').value));
            const group = document.getElementById('species_group').value;
            const health = parseFloat(document.getElementById('condition').value);
            if (!isNaN(dbh) && dbh > 0) {
                const { b0, b1 } = jenkinsData[group];
                const co2 = calcCO2(dbh, b0, b1, health);
                document.getElementById('current-co2').innerText = co2;
                updateChart(dbh, b0, b1, health);
            }
        }

        document.getElementById('dbh').addEventListener('input', runLiveCalc);
        document.getElementById('species_group').addEventListener('change', runLiveCalc);
        document.getElementById('condition').addEventListener('change', runLiveCalc);

        async function logData() {
            const id = document.getElementById('tree_id').value;
            const dbh = Math.round(parseFloat(document.getElementById('dbh').value));
            const groupText = document.getElementById('species_group').options[document.getElementById('species_group').selectedIndex].text;
            const conditionText = document.getElementById('condition').options[document.getElementById('condition').selectedIndex].text;
            const co2 = document.getElementById('current-co2').innerText;
            const coords = document.getElementById('coords').value;

            if (!id || isNaN(dbh)) { alert("Enter ID and DBH"); return; }
            
            document.getElementById('sync-status').innerText = "Syncing...";

            try {
                const response = await fetch(SHEET_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "Tree ID": id,
                        "DBH": dbh,
                        "Species Group": groupText,
                        "Condition": conditionText,
                        "GPS": coords,
                        "CO2 Lbs": co2,
                        "Timestamp": new Date().toLocaleString()
                    })
                });

                if (response.ok) {
                    document.getElementById('sync-status').innerText = "✅ Synced to Google Sheets";
                    surveyCount++;
                    document.getElementById('entry-count').innerText = surveyCount;
                    document.getElementById('tree_id').value = "";
                }
            } catch (err) {
                document.getElementById('sync-status').innerText = "❌ Sync Error";
            }
        }

        function updateChart(dbh, b0, b1, health) {
            const years = [0, 5, 10, 15, 20];
            const projection = years.map(y => calcCO2(dbh + (y * 0.25), b0, b1, health));

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('growthChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Now', '+5yr', '+10yr', '+15yr', '+20yr'],
                    datasets: [{
                        label: 'Lbs CO2',
                        data: projection,
                        borderColor: '#CC0000',
                        backgroundColor: 'rgba(204, 0, 0, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointBackgroundColor: '#222'
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: false } }
                }
            });
        }
        window.onload = () => updateChart(0, -2.48, 2.48, 1);
    </script>
</body>
</html>
