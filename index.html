<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU Tree Registry | Strategic Investment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent;}
        .ncsu-red { background-color: #CC0000; }
        #chart-container { position: relative; height: 280px; width: 100%; background: #fff; border-radius: 12px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #CC0000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #submit_btn, #proximity_note_container { display: none; }
    </style>
</head>
<body class="p-2 md:p-6 pb-20">

    <div id="overlay">
        <div class="spinner mx-auto mb-4"></div>
        <p class="font-black uppercase tracking-widest text-xs">Transmitting to NCSU Registry...</p>
    </div>

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-red-600">
        
        <div class="bg-zinc-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold uppercase mt-1 tracking-widest">Campus Planning & Strategic Investment</p>
            </div>
            <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest text-zinc-500">Asset Verification v4.2</div>
        </div>

        <div class="p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <form id="treeForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase">Surveyor Unity ID</label>
                    <input type="text" name="A:Surveyor" id="unity_id" class="w-full border-2 p-3 rounded-lg font-bold outline-none focus:border-red-600" placeholder="e.g. jdoe2" required>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase">Circumference (In)</label>
                        <input type="number" name="B:Circumference" id="circ_input" step="0.1" class="w-full border-2 p-3 rounded-lg font-bold" placeholder="37.7">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase">DBH (Inches)</label>
                        <input type="number" name="F:Calculated_DBH" id="dbh_input" step="0.1" class="w-full border-2 p-3 rounded-lg font-bold" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Species Grouping</label>
                        <select name="C:Species Group" id="species_group" class="w-full border-2 p-3 rounded-lg font-bold bg-white focus:border-red-600 outline-none" onchange="updateSpeciesHelper()" required>
                            <option value="" disabled selected>Identify type...</option>
                            <option value="hardwood">🌳 STURDY (Oak, Hickory)</option>
                            <option value="soft_hardwood">🍃 FAST (Maple, Poplar)</option>
                            <option value="evergreen">🌲 EVERGREEN (Pine, Cedar)</option>
                            <option value="small_ornate">🌸 SMALL (Dogwood, Holly)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Health Condition</label>
                        <select name="D:Condition" id="condition_select" class="w-full border-2 p-3 rounded-lg font-bold bg-white focus:border-red-600 outline-none" onchange="updateMath()" required>
                            <option value="1.0">Excellent (100%)</option>
                            <option value="0.8" selected>Good (80%)</option>
                            <option value="0.5">Fair (50%)</option>
                            <option value="0.2">Poor (20%)</option>
                            <option value="0.0">Dead (0%)</option>
                        </select>
                    </div>
                </div>

                <div id="species-help-box" class="hidden p-3 bg-zinc-900 rounded-lg border-l-4 border-red-600">
                    <p id="species-help-text" class="text-[11px] leading-snug text-zinc-300 italic font-medium"></p>
                </div>

                <div id="proximity_note_container" class="bg-orange-50 border-2 border-orange-200 p-4 rounded-lg">
                    <p class="text-[10px] font-black text-orange-700 uppercase mb-2">⚠️ PROXIMITY ALERT: Nearby Entry Detected</p>
                    <textarea name="J:Proximity_Note" id="prox_note" class="w-full p-2 text-sm border-2 rounded font-medium focus:border-orange-500 outline-none" placeholder="Provide a unique identifier (e.g. 'Tree has split trunk')"></textarea>
                </div>

                <div class="pt-2 space-y-3">
                    <button type="button" id="gps_verify_btn" onclick="handleGPS()" class="w-full bg-zinc-800 text-white p-4 rounded-lg font-black text-[10px] uppercase tracking-widest active:bg-black transition-all">🛰️ Capture & Verify Location</button>
                    <div id="status-box" class="bg-zinc-100 border-2 border-dashed border-zinc-300 rounded-lg p-4 text-center">
                        <p id="gps-msg" class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Awaiting GPS Hardware Signal</p>
                    </div>
                    <input type="hidden" name="E:GPS" id="coords" required>
                    <input type="hidden" name="G:CO2_Lbs" id="hidden_co2">
                    <input type="hidden" name="H:Asset_Value" id="hidden_value">
                    <input type="hidden" name="I:Timestamp" id="timestamp">
                </div>

                <button type="submit" id="submit_btn" class="w-full ncsu-red text-white p-5 rounded-xl font-black uppercase tracking-widest shadow-xl transition-transform active:scale-95">Confirm Tree Entry</button>
            </form>

            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-zinc-900 text-white p-6 rounded-2xl border-b-4 border-red-600 shadow-lg">
                        <p class="text-red-500 font-black text-[10px] uppercase tracking-widest">CO2 Sequestration</p>
                        <p class="text-4xl font-black italic mt-1"><span id="display-co2">0</span> <span class="not-italic text-sm text-zinc-500 font-bold">Lbs</span></p>
                    </div>
                    <div class="bg-zinc-900 text-white p-6 rounded-2xl border-b-4 border-green-500 shadow-lg">
                        <p class="text-green-500 font-black text-[10px] uppercase tracking-widest">Asset Value</p>
                        <p class="text-4xl font-black italic mt-1">$<span id="display-value">0.00</span></p>
                    </div>
                </div>
                <div class="bg-zinc-50 border-2 border-zinc-100 rounded-2xl p-4 shadow-inner">
                    <p class="text-[10px] font-black text-zinc-400 uppercase text-center mb-4 tracking-widest">20-Year Accumulation Forecast</p>
                    <div id="chart-container"><canvas id="growthChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const jenkins = { "hardwood": [-2.0127, 2.4342], "soft_hardwood": [-2.48, 2.4835], "evergreen": [-2.5356, 2.4349], "small_ornate": [-0.7152, 1.7029] };
    let myChart = null;

    window.onload = () => {
        const ctx = document.getElementById('growthChart').getContext('2d');
        myChart = new Chart(ctx, { type: 'line', data: { labels: ['Today', '+5y', '+10y', '+15y', '+20y'], datasets: [{ label: 'Lbs CO2', data: [0,0,0,0,0], borderColor: '#CC0000', backgroundColor: 'rgba(204,0,0,0.1)', fill: true, tension: 0.3, borderWidth: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        document.getElementById('unity_id').value = localStorage.getItem('ncsu_unity_id') || "";
    };

    function updateSpeciesHelper() {
        const group = document.getElementById('species_group').value;
        const helpBox = document.getElementById('species-help-box');
        const helpText = document.getElementById('species-help-text');
        const descs = {
            "hardwood": "🌳 STURDY: High-density wood (Oaks/Hickories). Stores maximum carbon.",
            "soft_hardwood": "🍃 FAST: Medium-density (Maples/Poplars). Rapid growth.",
            "evergreen": "🌲 EVERGREEN: Needle-bearing trees. Loblolly Pines, Cedars.",
            "small_ornate": "🌸 SMALL: Understory trees like Dogwoods or Crepe Myrtles."
        };
        if (descs[group]) {
            helpText.innerText = descs[group];
            helpBox.classList.remove('hidden');
        }
        updateMath();
    }

    function updateMath() {
        const dbh = parseFloat(document.getElementById('dbh_input').value) || 0;
        const group = document.getElementById('species_group').value;
        const condition = parseFloat(document.getElementById('condition_select').value) || 0.8;
        
        if (dbh > 0 && group) {
            const [b0, b1] = jenkins[group];
            // Math incorporates the condition factor directly
            const co2 = Math.round(Math.exp(b0 + b1 * Math.log(dbh * 2.54)) * 0.5 * 3.6663 * 2.2046 * condition);
            
            document.getElementById('display-co2').innerText = co2.toLocaleString();
            document.getElementById('display-value').innerText = (co2 * 0.09).toFixed(2);
            document.getElementById('hidden_co2').value = co2;
            document.getElementById('hidden_value').value = (co2 * 0.09).toFixed(2);
            
            myChart.data.datasets[0].data = [0, 5, 10, 15, 20].map(y => Math.round(Math.exp(b0 + b1 * Math.log((dbh + (y*0.2)) * 2.54)) * 0.5 * 3.6663 * 2.2046 * condition));
            myChart.update();
        }
    }

    document.getElementById('circ_input').oninput = function() {
        document.getElementById('dbh_input').value = (parseFloat(this.value) / Math.PI || 0).toFixed(1);
        updateMath();
    };
    document.getElementById('dbh_input').oninput = function() {
        document.getElementById('circ_input').value = (parseFloat(this.value) * Math.PI || 0).toFixed(1);
        updateMath();
    };

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function handleGPS() {
        const statusBox = document.getElementById('status-box');
        const gpsMsg = document.getElementById('gps-msg');
        const submitBtn = document.getElementById('submit_btn');
        gpsMsg.innerText = "🛰️ REQUESTING SIGNAL...";
        
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            const accuracy = pos.coords.accuracy;
            
            document.getElementById('coords').value = lat.toFixed(6) + ", " + lng.toFixed(6);
            window.tempGPS = { lat, lng };
            
            if (accuracy > 15) {
                gpsMsg.innerText = `❌ POOR SIGNAL (${Math.round(accuracy)}m)`;
                statusBox.style.backgroundColor = "#fee2e2";
                submitBtn.style.display = "none";
                return;
            }

            const dist = localStorage.getItem('last_lat') ? getDistance(lat, lng, parseFloat(localStorage.getItem('last_lat')), parseFloat(localStorage.getItem('last_lng'))) : 999;
            submitBtn.style.display = "block";

            if (dist < 7.62) {
                gpsMsg.innerText = "⚠️ PROXIMITY FLAG";
                statusBox.style.backgroundColor = "#fff7ed";
                document.getElementById('proximity_note_container').style.display = "block";
                document.getElementById('prox_note').required = true;
            } else {
                gpsMsg.innerText = `✅ VERIFIED (+/- ${Math.round(accuracy)}m)`;
                statusBox.style.backgroundColor = "#f0fdf4";
                document.getElementById('proximity_note_container').style.display = "none";
                document.getElementById('prox_note').required = false;
            }
        }, (err) => { 
            gpsMsg.innerText = "❌ GPS ERROR: ENABLE LOCATION"; 
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    }

    document.getElementById('treeForm').onsubmit = async (e) => {
        e.preventDefault();
