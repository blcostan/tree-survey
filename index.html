<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU Tree Registry | Campus Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
            -webkit-tap-highlight-color: transparent;
        }
        .ncsu-red { background-color: #CC0000; }
        #overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 5000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            text-align: center; 
        }
        .spinner { 
            width: 40px; 
            height: 40px; 
            border: 4px solid #333; 
            border-top: 4px solid #CC0000; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Visibility States */
        #submit_btn { display: none; }
        .graph-line { fill: none; stroke: #CC0000; stroke-width: 4; stroke-linecap: round; transition: all 0.5s ease; }
        .graph-point { fill: #CC0000; transition: all 0.5s ease; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="p-2 md:p-6 pb-20">

    <div id="overlay">
        <div class="spinner mx-auto mb-4"></div>
        <p class="font-black uppercase tracking-widest text-xs">Transmitting to NCSU Registry...</p>
    </div>

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-red-600">
        
        <div class="bg-zinc-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold uppercase mt-1 tracking-widest">Campus Planning & Strategic Investment</p>
            </div>
            <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Registry Engine v6.6</div>
        </div>

        <div class="flex flex-row border-b-2 border-zinc-200 bg-zinc-50 w-full">
            <button type="button" onclick="showPage('form')" id="btn-form" class="flex-1 inline-flex items-center justify-center gap-1 sm:gap-2 p-3 sm:p-4 font-black uppercase text-[9px] sm:text-[10px] tracking-tight sm:tracking-widest transition-all bg-white text-red-600 border-b-4 border-red-600 truncate">
                <span>📝</span> <span class="truncate">Entry Form</span>
            </button>
            <button type="button" onclick="showPage('map')" id="btn-map" class="flex-1 inline-flex items-center justify-center gap-1 sm:gap-2 p-3 sm:p-4 font-black uppercase text-[9px] sm:text-[10px] tracking-tight sm:tracking-widest transition-all text-zinc-400 hover:text-zinc-600 bg-zinc-50 border-b-4 border-transparent truncate">
                <span>🗺️</span> <span class="truncate">View Map</span>
            </button>
            <button type="button" onclick="showPage('leader')" id="btn-leader" class="flex-1 inline-flex items-center justify-center gap-1 sm:gap-2 p-3 sm:p-4 font-black uppercase text-[9px] sm:text-[10px] tracking-tight sm:tracking-widest transition-all text-zinc-400 hover:text-zinc-600 bg-zinc-50 border-b-4 border-transparent truncate">
                <span>🏆</span> <span class="truncate">Live Rankings</span>
            </button>
        </div>

        <div id="page-form" class="block">
            <div class="p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <form id="treeForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Surveyor Unity ID</label>
                        <input type="text" name="A:Surveyor" id="unity_id" oninput="this.value = this.value.toLowerCase()" class="w-full border-2 p-3 rounded-lg font-bold outline-none focus:border-red-600" placeholder
