<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCSU | Strategic Investment Tree Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .ncsu-red { background-color: #CC0000; }
        .ncsu-dark { background-color: #222222; }
        #chart-wrapper { height: 320px !important; width: 100%; position: relative; }
        input, select, button { font-size: 16px !important; } 
    </style>
</head>
<body class="min-h-screen p-2 md:p-4 pb-12">

    <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-2xl overflow-hidden border-t-8 border-red-600">
        <div class="ncsu-dark p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold tracking-widest uppercase mt-1">Campus Planning & Strategic Investment</p>
            </div>
        </div>

        <div class="p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-10">
            <div class="lg:col-span-5 space-y-6">
                <form id="treeForm" class="space-y-4">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Circumference (Inches)</label>
                            <input type="number" name="B:Circumference" id="circ_input" step="any" min="0" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold focus:ring-2 focus:ring-red-600 outline-none" placeholder="Inches">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">DBH (Inches)</label>
                            <input type="number" name="F:Calculated_DBH" id="dbh_input" step="any" min="0" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold focus:ring-2 focus:ring-red-600 outline-none" placeholder="Inches">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Species Group</label>
                        <select name="C:Species Group" id="species_group" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold focus:ring-2 focus:ring-red-600 outline-none" required>
                            <option value="" disabled selected>Select Group</option>
                            <option value="mixed_hardwood">Mixed Hardwood (Poplar/Gum)</option>
                            <option value="pine">Softwood (Pine/Conifer)</option>
                            <option value="hard_maple">Hardwood (Oak/Sugar Maple)</option>
                            <option value="soft_maple">Soft Maple (Red/Silver)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Tree Condition</label>
                        <select name="D:Condition" id="tree_condition" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold focus:ring-2 focus:ring-red-600 outline-none">
                            <option value="1.0">Excellent (100% Value)</option>
                            <option value="0.8" selected>Good (80% Value)</option>
                            <option value="0.6">Fair (60% Value)</option>
                            <option value="0.4">Poor (40% Value)</option>
                            <option value="0.2">Dead/Dying (20% Value)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">GPS Location</label>
                        <div class="flex gap-2">
                            <input type="text" name="E:GPS" id="coords" readonly class="flex-1 bg-stone-100 border border-stone-300 rounded-lg px-4 py-3 text-[11px] font-mono" placeholder="Tap Capture..." required>
                            <button type="button" onclick="handleGPS()" class="ncsu-dark text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Capture</button>
                        </div>
                    </div>

                    <input type="hidden" name="G:CO2_Lbs" id="hidden_co2">
                    <input type="hidden" name="H:Asset_Value" id="hidden_value">
                    <input type="hidden" name="I:Timestamp" id="timestamp">

                    <button type="submit" class="w-full ncsu-red text-white font-black py-5 rounded-xl shadow-xl uppercase tracking-widest mt-4 active:scale-95 transition-all">Log to Asset Registry</button>
                </form>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-stone-900 text-white p-4 md:p-6 rounded-2xl shadow-lg border-b-4 border-red-600">
                        <p class="text-red-500 font-bold text-[10px] uppercase tracking-widest">Adjusted CO2 Storage</p>
                        <p class="text-3xl md:text-4xl font-black italic mt-1"><span id="display-co2">0</span> <span class="text-xs text-stone-500 uppercase">lbs</span></p>
                    </div>
                    <div class="bg-stone-900 text-white p-4 md:p-6 rounded-2xl shadow-lg border-b-4 border-green-500">
                        <p class="text-green-500 font-bold text-[10px] uppercase tracking-widest">Social Value</p>
                        <p class="text-3xl md:text-4xl font-black italic mt-1">$<span id="display-value">0.00</span></p>
                    </div>
                </div>
                <div class="bg-white border border-stone-200 rounded-2xl p-2 shadow-inner">
                    <div id="chart-wrapper">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const jenkinsData = {
            "mixed_hardwood": { b0: -2.4800, b1: 2.4835 },
            "pine": { b0: -2.5356, b1: 2.4349 },
            "hard_maple": { b0: -2.0127, b1: 2.4342 },
            "soft_maple": { b0: -1.9123, b1: 2.3651 }
        };

        const EPA_RATE = 0.09; 
        let myChart = null;

        const circInput = document.getElementById('circ_input');
        const dbhInput = document.getElementById('dbh_input');

        // SYNC LOGIC
        circInput.addEventListener('input', () => {
            const circ = parseFloat(circInput.value) || 0;
            if (circ > 0) {
                dbhInput.value = (circ / Math.PI).toFixed(2);
            } else {
                dbhInput.value = "";
            }
            updateMath();
        });

        dbhInput.addEventListener('input', () => {
            const dbh = parseFloat(dbhInput.value) || 0;
            if (dbh > 0) {
                circInput.value = (dbh * Math.PI).toFixed(2);
            } else {
                circInput.value = "";
            }
            updateMath();
        });

        function handleGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        document.getElementById('coords').value = pos.coords.latitude.toFixed(5) + ", " + pos.coords.longitude.toFixed(5);
                    },
                    (err) => alert("GPS Error: Enable location."),
                    { enableHighAccuracy: true }
                );
            }
        }

        function calcCO2(dbhIn, b0, b1, multiplier) {
            if (!dbhIn || dbhIn <= 0) return 0;
            const dbhCm = dbhIn * 2.54;
            const biomassKg = Math.exp(b0 + b1 * Math.log(dbhCm));
            return Math.round((biomassKg * 0.5) * 3.6663 * 2.20462 * multiplier);
        }

        function updateMath() {
            const dbh = parseFloat(dbhInput.value) || 0;
            const group = document.getElementById('species_group').value;
            const multiplier = parseFloat(document.getElementById('tree_condition').value);
            
            if (dbh > 0 && group) {
                const { b0, b1 } = jenkinsData[group];
                const co2 = calcCO2(dbh, b0, b1, multiplier);
                const dollarValue = co2 * EPA_RATE;

                document.getElementById('display-co2').innerText = co2.toLocaleString();
                document.getElementById('display-value').innerText = dollarValue.toLocaleString(undefined, {minimumFractionDigits: 2});
                
                document.getElementById('hidden_co2').value = co2;
                document.getElementById('hidden_value').value = dollarValue.toFixed(2);
                
                renderChart(dbh, b0, b1, multiplier);
            }
        }

        function renderChart(dbh, b0, b1, multiplier) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            const projection = [0, 5, 10, 15, 20].map(y => calcCO2(dbh + (y * 0.20), b0, b1, multiplier));
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Now', '+5y', '+10y', '+15y', '+20y'],
                    datasets: [{ label: 'Lbs CO2', data: projection, borderColor: '#CC0000', backgroundColor: 'rgba(204, 0, 0, 0.1)', fill: true }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        document.getElementById('treeForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('timestamp').value = new Date().toLocaleString();
            try {
                const SHEET_URL = "https://api.sheetmonkey.io/form/38UXSMPRKwdshUDaCwDnHk";
                await fetch(SHEET_URL, { method: 'POST', body: new FormData(e.target), mode: 'no-cors' });
                alert("SUCCESS: DATA SYNCED");
                e.target.reset();
                if(myChart) myChart.destroy();
            } catch (err) { alert("Submission Error."); }
        };

        ['species_group', 'tree_condition'].forEach(id => {
            document.getElementById(id).addEventListener('change', updateMath);
        });
    </script>
</body>
</html>
