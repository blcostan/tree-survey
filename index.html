<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU Tree Registry | Strategic Investment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .ncsu-red { background-color: #CC0000; }
        #submit_btn { display: none; }
        #proximity_note_container { display: none; }
    </style>
</head>
<body class="p-2 md:p-6 pb-20">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-red-600">
        <div class="bg-zinc-900 p-6 text-white">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">NC STATE UNIVERSITY</h1>
            <p class="text-red-500 text-[10px] font-bold uppercase tracking-widest">Asset Registry | Competition Mode</p>
        </div>

        <div class="p-6">
            <form id="treeForm" class="space-y-4">
                <input type="text" name="A:Surveyor" id="unity_id" placeholder="Unity ID" class="w-full border-2 p-3 rounded-lg font-bold" required>
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="circ_input" placeholder="Circumference" class="border-2 p-3 rounded-lg font-bold">
                    <input type="number" name="F:Calculated_DBH" id="dbh_input" placeholder="DBH" class="border-2 p-3 rounded-lg font-bold" required>
                </div>

                <select name="C:Species Group" id="species_group" class="w-full border-2 p-3 rounded-lg font-bold" required>
                    <option value="" disabled selected>Select Species Group...</option>
                    <option value="hardwood">Broadleaf: Sturdy (Oak, Hickory)</option>
                    <option value="soft_hardwood">Broadleaf: Fast (Maple, Poplar)</option>
                    <option value="evergreen">Evergreen: Needles (Pine, Cedar)</option>
                    <option value="small_ornate">Small/Flowering (Dogwood, Holly)</option>
                </select>

                <div id="proximity_note_container" class="bg-orange-50 border-2 border-orange-200 p-4 rounded-lg">
                    <p class="text-[10px] font-black text-orange-700 uppercase mb-2">⚠️ PROXIMITY ALERT: Nearby Tree Detected</p>
                    <label class="block text-[10px] font-bold text-zinc-600 mb-1">Describe this tree to prove it's a new asset:</label>
                    <textarea name="J:Proximity_Note" id="prox_note" class="w-full p-2 text-sm border-2 rounded" placeholder="e.g. 'Smaller maple 5ft North of the Oak'"></textarea>
                </div>

                <div class="pt-4 space-y-3">
                    <button type="button" onclick="handleGPS()" class="w-full bg-zinc-800 text-white p-4 rounded-lg font-black text-[10px] uppercase tracking-widest">🛰️ Capture & Verify Location</button>
                    
                    <div id="status-box" class="bg-zinc-100 border-2 border-dashed p-4 text-center rounded-lg">
                        <p id="gps-msg" class="text-[10px] font-black text-zinc-500 uppercase">GPS Verification Required</p>
                    </div>

                    <input type="hidden" name="E:GPS" id="coords">
                    <input type="hidden" name="G:CO2_Lbs" id="hidden_co2">
                    <input type="hidden" name="H:Asset_Value" id="hidden_value">
                    <input type="hidden" name="I:Timestamp" id="timestamp">
                </div>

                <button type="submit" id="submit_btn" class="w-full ncsu-red text-white p-5 rounded-xl font-black uppercase tracking-widest shadow-xl">Log Asset</button>
            </form>
        </div>
    </div>

    <script>
        const jenkins = { "hardwood": [-2.0127, 2.4342], "soft_hardwood": [-2.48, 2.4835], "evergreen": [-2.5356, 2.4349], "small_ornate": [-0.7152, 1.7029] };
        
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function handleGPS() {
            const gpsMsg = document.getElementById('gps-msg');
            const noteBox = document.getElementById('proximity_note_container');
            const submitBtn = document.getElementById('submit_btn');

            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const lastLat = localStorage.getItem('last_lat');
                const lastLng = localStorage.getItem('last_lng');
                const dist = lastLat ? getDistance(lat, lng, parseFloat(lastLat), parseFloat(lastLng)) : 999;

                document.getElementById('coords').value = `${lat}, ${lng}`;

                if (dist < 2.5) { // If closer than 8 feet
                    gpsMsg.innerText = "⚠️ NEARBY ASSET FLAG";
                    noteBox.style.display = "block";
                    document.getElementById('prox_note').required = true;
                } else {
                    gpsMsg.innerText = "✅ LOCATION VERIFIED";
                    noteBox.style.display = "none";
                    document.getElementById('prox_note').required = false;
                }
                
                submitBtn.style.display = "block";
                window.currentPos = { lat, lng };
            }, null, {enableHighAccuracy: true});
        }

        // Logic for Math & Submission (simplified for brevity)
        document.getElementById('circ_input').oninput = function() { 
            document.getElementById('dbh_input').value = (this.value / Math.PI).toFixed(1); 
            const dbh = parseFloat(document.getElementById('dbh_input').value);
            const group = document.getElementById('species_group').value;
            if(dbh && group) {
                const co2 = Math.round(Math.exp(jenkins[group][0] + jenkins[group][1] * Math.log(dbh * 2.54)) * 0.5 * 3.6663 * 2.2046 * 0.8);
                document.getElementById('hidden_co2').value = co2;
                document.getElementById('hidden_value').value = (co2 * 0.09).toFixed(2);
            }
        };

        document.getElementById('treeForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('timestamp').value = new Date().toLocaleString();
            localStorage.setItem('last_lat', window.currentPos.lat);
            localStorage.setItem('last_lng', window.currentPos.lng);
            localStorage.setItem('ncsu_unity_id', document.getElementById('unity_id').value);

            await fetch("https://api.sheetmonkey.io/form/336EJZmaN8Aa7rG5DSNAJG", { 
                method: 'POST', body: new FormData(e.target), mode: 'no-cors' 
            });
            alert("Logged!");
            location.reload();
        };
    </script>
</body>
</html>
