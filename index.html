<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU | Strategic Investment Tree Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .ncsu-red { background-color: #CC0000; }
        .ncsu-dark { background-color: #222222; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        @keyframes subtle-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .helper-active { animation: subtle-pulse 0.4s ease-in-out; }
    </style>
</head>
<body class="min-h-screen p-4 pb-12">

    <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-2xl overflow-hidden border-t-8 border-red-600">
        <div class="ncsu-dark p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold tracking-widest uppercase mt-1">Campus Planning & Strategic Investment</p>
            </div>
            <div class="text-[10px] font-bold text-red-700 bg-white px-3 py-1.5 rounded uppercase">
                ACADEMIC REGISTRY ACTIVE
            </div>
        </div>

        <div class="p-8 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 space-y-6">
                <form id="treeForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Tree ID Reference</label>
                        <input type="text" name="Tree ID" id="tree_id" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold uppercase outline-none focus:ring-2 focus:ring-red-600" placeholder="e.g. OAK-01" required>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Circumference (Inches)</label>
                            <input type="number" name="Circumference" id="circ_input" step="0.1" min="0" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold focus:ring-2 focus:ring-red-600 outline-none" placeholder="Measure @ 4.5ft" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Species Group</label>
                            <select name="Species Group" id="species_group" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold focus:ring-2 focus:ring-red-600 outline-none" required>
                                <option value="" disabled selected>Select Group</option>
                                <option value="mixed_hardwood">Mixed Hardwood (Poplar/Gum)</option>
                                <option value="pine">Softwood (Pine/Conifer)</option>
                                <option value="hard_maple">Hardwood (Oak/Sugar Maple)</option>
                                <option value="soft_maple">Soft Maple (Red/Silver)</option>
                            </select>
                        </div>
                    </div>

                    <div id="species-helper" class="p-4 bg-red-50 border-2 border-red-200 rounded-xl hidden transition-all">
                        <p class="text-[9px] font-black text-red-800 uppercase mb-1 tracking-widest">Arborist ID Tip</p>
                        <p id="helper-text" class="text-[12px] text-stone-800 leading-snug italic font-medium"></p>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Tree Condition (Vitality Factor)</label>
                        <select name="Condition" id="tree_condition" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold focus:ring-2 focus:ring-red-600 outline-none">
