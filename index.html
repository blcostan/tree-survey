<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU Tree Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f8f8; }
        .ncsu-red { background-color: #CC0000; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden border-t-8 border-red-600">
        <div class="bg-stone-900 p-6 text-white flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase">NC STATE UNIVERSITY</h1>
            <span id="sync-status" class="text-[10px] font-bold bg-white text-red-700 px-3 py-1 rounded tracking-widest uppercase">System Ready</span>
        </div>

        <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
            <form id="treeForm" class="space-y-4">
                <input type="text" name="Tree ID" id="tree_id" placeholder="Tree ID #" class="w-full border p-3 rounded font-bold" required>
                <input type="number" name="DBH" id="dbh" placeholder="DBH (Inches)" class="w-full border p-3 rounded font-bold" required>
                <select name="Species Group" id="species_group" class="w-full border p-3 rounded text-sm font-semibold">
                    <option value="mixed_hardwood">Mixed Hardwood</option>
                    <option value="pine">Pine/Softwood</option>
                    <option value="hard_maple">Oak/Hardwood</option>
                </select>
                <select name="Condition" id="condition" class="w-full border p-3 rounded text-sm font-semibold">
                    <option value="1.0">Excellent (100%)</option>
                    <option value="0.8">Good (80%)</option>
                    <option value="0.6">Fair (60%)</option>
                </select>
                <input type="hidden" name="CO2 Lbs" id="hidden-co2" value="0">
                <input type="hidden" name="GPS" id="coords" value="">
                <input type="hidden" name="Timestamp" id="timestamp" value="">
                
                <button type="submit" class="w-full ncsu-red text-white font-black py-4 rounded-lg uppercase shadow-lg">Submit Log Entry</button>
            </form>

            <div class="space-y-4">
                <div class="bg-stone-100 p-6 rounded-xl border border-stone-200">
                    <p class="text-red-600 font-bold text-[10px] uppercase">Calculated CO2 Storage</p>
                    <p class="text-5xl font-black italic"><span id="display-co2">0</span> <span class="text-sm text-stone-400">LBS</span></p>
                </div>
                <canvas id="growthChart" height="150"></canvas>
            </div>
        </div>
        
        <footer class="p-6 border-t text-[10px] text-stone-400 italic text-center">
            Jenkins, J.C., et al. (2003). Biomass Regressions for North American Tree Species.
        </footer>
    </div>

    <script>
        const jenkinsData = {
            "hard_maple": { b0: -2.0127, b1: 2.4342 }, 
            "pine": { b0: -2.5356, b1: 2.4349 },
            "mixed_hardwood": { b0: -2.4800, b1: 2.4835 }
        };

        const SHEET_URL = "https://api.sheetmonkey.io/form/38UXSMPRKwdshUDaCwDnHk";
        let myChart;

        function updateMath() {
            const dbh = parseFloat(document.getElementById('dbh').value) || 0;
            const group = document.getElementById('species_group').value;
            const health = parseFloat(document.getElementById('condition').value);
            
            if (dbh > 0) {
                const { b0, b1 } = jenkinsData[group];
                const biomassKg = Math.exp(b0 + b1 * Math.log(dbh * 2.54));
                const co2 = Math.round((biomassKg * 0.5) * 3.6663 * 2.20462 * health);
                
                document.getElementById('display-co2').innerText = co2;
                document.getElementById('hidden-co2').value = co2;
            }
        }

        document.getElementById('dbh').addEventListener('input', updateMath);
        document.getElementById('species_group').addEventListener('change', updateMath);

        document.getElementById('treeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('sync-status').innerText = "SYNCING...";
            document.getElementById('timestamp').value = new Date().toLocaleString();

            const formData = new FormData(e.target);
            
            try {
                await fetch(SHEET_URL, {
                    method: 'POST',
                    body: formData, // Sending as Form Data is better for Sheet Monkey
                    mode: 'no-cors'
                });
                document.getElementById('sync-status').innerText = "✅ SYNCED";
                e.target.reset();
                document.getElementById('display-co2').innerText = "0";
            } catch (err) {
                document.getElementById('sync-status').innerText = "❌ ERROR";
            }
        });
    </script>
</body>
</html>
