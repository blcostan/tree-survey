<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCSU | Strategic Investment Tree Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .ncsu-red { background-color: #CC0000; }
        .ncsu-dark { background-color: #222222; }
        #chart-container { position: relative; height: 320px; width: 100%; margin-top: 10px; }
        input, select, button { font-size: 16px !important; } 
        #photo-preview { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid #ddd; }
        .custom-file-upload {
            display: inline-block; width: 100%; padding: 12px; cursor: pointer;
            background-color: #e5e7eb; color: #374151; border-radius: 8px;
            text-align: center; font-size: 10px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.05em; border: 2px dashed #9ca3af;
        }
    </style>
</head>
<body class="p-2 md:p-4 pb-20">

    <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-2xl overflow-hidden border-t-8 border-red-600">
        <div class="ncsu-dark p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold tracking-widest uppercase mt-1">Campus Planning & Strategic Investment</p>
            </div>
            <a href="https://lookerstudio.google.com/reporting/d92171ad-111b-4cd0-8fce-09dd1835a50b" target="_blank" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-lg text-[10px] font-black uppercase shadow-lg">Results ↗</a>
        </div>

        <div class="p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-10 border-b border-stone-100">
            <div class="lg:col-span-5 space-y-6">
                <form id="treeForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Unity ID (Required)</label>
                        <input type="text" name="A:Surveyor" id="unity_id" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold focus:ring-2 focus:ring-red-600 outline-none" placeholder="e.g. jdoe2" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Circumference (In)</label>
                            <input type="number" name="B:Circumference" id="circ_input" step="0.1" min="0" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold focus:ring-2 focus:ring-red-600 outline-none" placeholder="Inches">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">DBH (Inches)</label>
                            <input type="number" id="dbh_input" step="0.1" min="0" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold focus:ring-2 focus:ring-red-600 outline-none" placeholder="Inches">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Species Group</label>
                        <select name="C:Species Group" id="species_group" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold focus:ring-2 focus:ring-red-600 outline-none" required>
                            <option value="" disabled selected>Tap to Identify...</option>
                            <option value="hardwood">Broadleaf: Sturdy (Oak, Hickory, Beech)</option>
                            <option value="soft_hardwood">Broadleaf: Tall/Fast (Poplar, Sweetgum, Elm)</option>
                            <option value="evergreen">Evergreen: Needles/Scales (Pine, Cedar)</option>
                            <option value="small_ornate">Small/Flowering (Dogwood, Holly)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Tree Condition</label>
                        <select name="D:Condition" id="tree_condition" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold focus:ring-2 focus:ring-red-600 outline-none">
                            <option value="1.0">Excellent (100%)</option>
                            <option value="0.8" selected>Good (80%)</option>
                            <option value="0.6">Fair (60%)</option>
                            <option value="0.4">Poor (40%)</option>
                        </select>
                    </div>

                    <div id="species-helper" class="p-4 bg-red-50 border-2 border-red-200 rounded-xl hidden text-[12px] italic text-stone-800 font-medium"></div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Documentation (Optional)</label>
                        <label for="photo_input" class="custom-file-upload">📸 Take Tree Photo</label>
                        <input type="file" name="J:Photo" id="photo_input" accept="image/*" capture="environment" class="hidden">
                        <img id="photo-preview" alt="Preview">
                    </div>

                    <div>
                        <button type="button" onclick="handleGPS()" class="w-full ncsu-dark text-white px-4 py-3 rounded-lg text-[10px] font-black uppercase mb-2 active:bg-black">Capture GPS Location</button>
                        <input type="text" name="E:GPS" id="coords" readonly class="w-full bg-stone
