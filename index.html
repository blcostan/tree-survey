<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU | Strategic Investment Tree Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .ncsu-red { background-color: #CC0000; }
        .ncsu-dark { background-color: #222222; }
        /* This prevents the chart from pushing the container boundaries */
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="min-h-screen p-4 pb-12">

    <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-2xl overflow-hidden border-t-8 border-red-600">
        <div class="ncsu-dark p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold tracking-widest uppercase mt-1">Campus Planning & Strategic Investment</p>
            </div>
            <div class="text-[10px] font-bold text-red-700 bg-white px-3 py-1.5 rounded uppercase">
                ACADEMIC REGISTRY ACTIVE
            </div>
        </div>

        <div class="p-8 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 space-y-6">
                <form id="treeForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Tree ID Reference</label>
                        <input type="text" name="Tree ID" id="tree_id" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold uppercase" placeholder="e.g. OAK-01">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Circumference (Inches)</label>
                            <input type="number" name="Circumference" id="circ_input" step="0.1" min="1" class="w-full border border-stone-300 rounded-lg px-4 py-3 font-bold" placeholder="Measure @ 4.5ft" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Species Group</label>
                            <select name="Species Group" id="species_group" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold">
                                <option value="mixed_hardwood">Mixed Hardwood</option>
                                <option value="pine">Softwood (Pine)</option>
                                <option value="hard_maple">Hardwood (Oak)</option>
                                <option value="soft_maple">Soft Maple</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">Tree Condition</label>
                        <select name="Condition" id="tree_condition" class="w-full border border-stone-300 rounded-lg px-4 py-3 text-xs font-semibold">
                            <option value="Excellent">Excellent</option>
                            <option value="Good" selected>Good</option>
                            <option value="Fair">Fair</option>
                            <option value="Poor">Poor</option>
                            <option value="Dead/Dying">Dead/Dying</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-stone-500 uppercase mb-1">GPS Location</label>
                        <div class="flex gap-2">
                            <input type="text" name="GPS" id="coords" readonly class="flex-1 bg-stone-100 border border-stone-300 rounded-lg px-4 py-3 text-[11px] font-mono" placeholder="Click Capture">
                            <button type="button" onclick="getLocation()" class="ncsu-dark text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-black transition">Capture</button>
                        </div>
                    </div>

                    <input type="hidden" name="Calculated_DBH" id="hidden_dbh">
                    <input type="hidden" name="CO2_Lbs" id="hidden_co2">
                    <input type="hidden" name="Asset_Value" id="hidden_value">
                    <input type="hidden" name="Timestamp" id="timestamp">

                    <button type="submit" class="w-full ncsu-red text-white font-black py-5 rounded-xl shadow-xl uppercase tracking-widest mt-4 hover:brightness-110 active:scale-95 transition-all">Log to Asset Registry</button>
                </form>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-stone-900 text-white p-6 rounded-
