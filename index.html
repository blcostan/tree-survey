<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSU Tree Registry | Campus Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent;}
        .ncsu-red { background-color: #CC0000; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #CC0000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #submit_btn, #proximity_note_container { display: none; }
        .graph-line { fill: none; stroke: #CC0000; stroke-width: 4; stroke-linecap: round; transition: all 0.5s ease; }
        .graph-point { fill: #CC0000; transition: all 0.5s ease; }
    </style>
</head>
<body class="p-2 md:p-6 pb-20">

    <div id="overlay">
        <div class="spinner mx-auto mb-4"></div>
        <p class="font-black uppercase tracking-widest text-xs">Transmitting to NCSU Registry...</p>
    </div>

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-red-600">
        
        <div class="bg-zinc-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter">NC STATE UNIVERSITY</h1>
                <p class="text-red-500 text-[10px] font-bold uppercase mt-1 tracking-widest">Campus Planning & Strategic Investment</p>
            </div>
            <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Registry Engine v6.5</div>
        </div>

        <div class="flex border-b-2 border-zinc-200 bg-zinc-50">
            <button type="button" onclick="showPage('form')" id="btn-form" class="flex-1 inline-flex items-center justify-center gap-2 p-4 font-black uppercase text-[10px] tracking-widest transition-all bg-white text-red-600 border-b-4 border-red-600">
                <span class="text-base">📝</span> Entry
            </button>
            <button type="button" onclick="showPage('map')" id="btn-map" class="flex-1 inline-flex items-center justify-center gap-2 p-4 font-black uppercase text-[10px] tracking-widest transition-all text-zinc-400 hover:text-zinc-600 bg-zinc-50">
                <span class="text-base">🗺️</span> Map
            </button>
            <button type="button" onclick="showPage('leader')" id="btn-leader" class="flex-1 inline-flex items-center justify-center gap-2 p-4 font-black uppercase text-[10px] tracking-widest transition-all text-zinc-400 hover:text-zinc-600 bg-zinc-50">
                <span class="text-base">🏆</span> Leaderboard
            </button>
        </div>

        <div id="page-form" class="block">
            <div class="p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <form id="treeForm" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Surveyor Unity ID</label>
                        <input type="text" name="A:Surveyor" id="unity_id" class="w-full border-2 p-3 rounded-lg font-bold outline-none focus:border-red-600" placeholder="e.g. jdoe2" required>
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Species Group</label>
                            <button type="button" onclick="toggleModal()" class="text-sm font-black text-red-600 uppercase border-b border-red-600 tracking-tighter hover:text-zinc-900 hover:border-zinc-900 transition-colors">❓ ID Guide</button>
                        </div>
                        <select name="C:Species Group" id="species_group" class="w-full border-2 p-3 rounded-lg font-bold bg-white" onchange="updateSpeciesHelper()" required>
                            <option value="" disabled selected>Identify type...</option>
                            <option value="hardwood">🌳 STURDY (Oak, Hickory)</option>
                            <option value="soft_hardwood">🍃 FAST (Maple, Poplar)</option>
                            <option value="evergreen">🌲 EVERGREEN (Pine, Cedar)</option>
                            <option value="small_ornate">🌸 SMALL (Dogwood, Holly)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Circumference (In)</label>
                            <input type="number" id="circ_input" step="0.1" class="w-full border-2 p-3 rounded-lg font-bold outline-none focus:border-red-600" placeholder="37.7">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">DBH (Inches)</label>
                            <input type="number" name="F:Calculated_DBH" id="dbh_input" step="0.1" class="w-full border-2 p-3 rounded-lg font-bold outline-none focus:border-red-600" required>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Tree Condition</label>
                            <button type="button" onclick="toggleConditionModal()" class="text-sm font-black text-red-600 uppercase border-b-2 border-red-600 tracking-tighter hover:text-zinc-900 hover:border-zinc-900 transition-colors py-1">❓ Health Guide</button>
                        </div>
                        <select name="D:Condition" id="condition_select" class="w-full border-2 p-3 rounded-lg font-bold bg-white" onchange="updateMath()" required>
                            <option value="1.0">Excellent</option>
                            <option value="0.8" selected>Good</option>
                            <option value="0.6">Fair</option>
                            <option value="0.4">Poor</option>
                            <option value="0.25">Dead</option>
                        </select>
                    </div>

                    <div class="space-y-2 mt-4">
                        <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest">Community Value</label>
                        <div class="relative">
                            <button type="button" onclick="toggleLikes()" id="likes_trigger" class="w-full border-2 p-3 rounded-lg font-bold bg-white text-left flex justify-between items-center focus:border-red-600 outline-none">
                                <span id="likes_label" class="text-sm text-zinc-400">Select value(s)...</span>
                                <span class="text-zinc-400">▼</span>
                            </button>
                            <div
